## AOS Framework — Production Docker Compose (Dokploy)
##
## Architecture:
##   framework.aos.engineer → site (static Astro site, nginx, port 80)
##
## Routing: Managed via Dokploy Domains UI (not Traefik labels).
## No database, no env vars required — pure static site.

services:
  site:
    image: novashock/aos-framework-site:latest
    build:
      context: .
      dockerfile: site/Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
