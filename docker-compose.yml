## AOS Harness — Production Docker Compose (Dokploy)
##
## Architecture:
##   harness.aos.engineer → site (static Astro site, nginx, port 80)
##
## Routing: Managed via Dokploy Domains UI (not Traefik labels).
## No database, no env vars required — pure static site.

services:
  site:
    image: novashock/aos-harness-site:0.8.1-20260421
    build:
      context: .
      dockerfile: site/Dockerfile
      args:
        SITE_VERSION: "0.8.1"
        SITE_BUILD_ID: "2026-04-21-docs-refresh"
        BUILD_DATE: "2026-04-21T00:00:00Z"
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
