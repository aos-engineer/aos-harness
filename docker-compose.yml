version: "3.8"

services:
  site:
    build:
      context: .
      dockerfile: site/Dockerfile
    image: novashock/aos-framework-site:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
