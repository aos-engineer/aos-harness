name: provenance-probe

# One-time verification that `bun publish --provenance` produces a real npm
# provenance attestation when run inside GitHub Actions with an OIDC token.
# Result drives the choice between `bun publish` vs `npx npm publish` in
# scripts/publish.ts --ci (see docs/security/provenance-probe-result.md).
#
# Trigger: manual only.
#   gh workflow run provenance-probe.yml
#
# Requires repo-scoped secret NPM_TOKEN_PROBE (automation token scoped to
# @aos-harness scope, separate from the release-workflow NPM_TOKEN so we can
# revoke it independently after the probe).

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Print Bun version
        run: bun --version

      - name: Publish probe with npm publish --provenance
        working-directory: scripts/provenance-probe
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_PROBE }}
        run: npx --yes npm@latest publish --access public --provenance

      - name: Verify provenance via npm audit signatures (install-then-audit)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_PROBE }}
        run: |
          mkdir /tmp/verify && cd /tmp/verify
          npm init -y > /dev/null

          # npm registry CDN propagation can take 15-120 seconds after publish.
          # Retry the install up to 6x with a 15s backoff before giving up.
          # IMPORTANT: install WITHOUT --no-save so npm audit signatures sees
          # the dep in package.json (it only audits declared dependencies).
          for attempt in 1 2 3 4 5 6; do
            if npm install @aos-harness/provenance-probe@0.0.3 2>&1; then
              echo "install succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" = "6" ]; then
              echo "install still failing after 6 attempts — registry did not propagate"
              exit 1
            fi
            echo "install attempt $attempt failed (propagation delay); sleeping 15s"
            sleep 15
          done

          npm audit signatures

      - name: Show attestation metadata
        run: npm view @aos-harness/provenance-probe@0.0.3 dist.attestations
